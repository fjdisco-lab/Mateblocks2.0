<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora que te explica · Multiplicación</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#141322;
    --surface:#1c1b2e;
    --surface2:#262539;
    --line:#33324a;
    --hdr-bg:#2e2d49;
    --hdr-text:#e8e9f5;
    --text:#fffffe;
    --muted:#a7a9be;
    --res:#06d6a0;
    --num:#ffd166;
    --c1:#ff6b6b; --c2:#ffd166; --c3:#06d6a0; --c4:#118ab2; --c5:#c77dff;
    --cell:44px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html{-webkit-text-size-adjust:100%;}
  body{
    font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);
    min-height:100vh;padding:12px clamp(8px,2.5vw,24px) 32px;
  }
  .wrap{max-width:1020px;margin:0 auto;}

  /* ── MODOS ── */
  .modes{display:flex;justify-content:center;gap:8px;padding-bottom:10px;}
  .mode-btn{
    font-family:'Fredoka',sans-serif;font-weight:500;font-size:.95rem;
    color:var(--muted);background:var(--surface);border:1.5px solid var(--line);
    border-radius:999px;padding:8px 18px;cursor:pointer;
    transition:color .15s, border-color .15s, background .15s;
  }
  .mode-btn.active{color:var(--text);border-color:var(--num);background:var(--surface2);}
  .mode-btn:focus-visible{outline:2px solid var(--c4);outline-offset:2px;}

  /* ── ECUACIÓN ── */
  .eq{
    font-family:'Fredoka',sans-serif;font-weight:600;
    font-size:clamp(1.9rem,7vw,3rem);
    text-align:center;letter-spacing:2px;
    padding:6px 0 12px;user-select:none;min-height:1.4em;
  }
  .eq .op{color:var(--muted);font-weight:500;}
  .eq .res{color:var(--res);}
  .eq .nA,.eq .nB{color:var(--num);}
  .eq .placeholder{color:var(--muted);font-size:.45em;font-family:'Nunito',sans-serif;font-weight:700;letter-spacing:0;}

  .panel{display:none;}
  .panel.active{display:block;}

  /* ── TABLA ── */
  .tabla-scroll{
    overflow:auto;border:1.5px solid var(--line);border-radius:14px;
    background:var(--surface);max-height:calc(100vh - 220px);
    overscroll-behavior:contain;
  }
  .tabla{
    display:grid;gap:3px;padding:6px;width:max-content;min-width:100%;
    touch-action:manipulation;
  }
  @media(max-width:700px){:root{--cell:34px;}}
  .cell{
    aspect-ratio:1;display:flex;align-items:center;justify-content:center;
    border-radius:6px;font-weight:800;
    font-size:clamp(.6rem, calc(var(--cell) * .27), .85rem);
    background:var(--surface2);color:var(--muted);
    border:none;cursor:pointer;font-family:'Nunito',sans-serif;
    transition:background .12s, color .12s, transform .08s;
    padding:0;min-width:30px;
  }
  .cell:focus-visible{outline:2px solid var(--c4);outline-offset:1px;z-index:5;}
  .cell.hdr{
    background:var(--hdr-bg);color:var(--hdr-text);cursor:default;
    font-family:'Fredoka',sans-serif;font-weight:600;
    font-size:clamp(.7rem, calc(var(--cell) * .32), 1rem);
    position:sticky;z-index:3;border-radius:0;
  }
  .cell.hdr.top{top:0;box-shadow:0 2px 0 var(--line);}
  .cell.hdr.left{left:0;box-shadow:2px 0 0 var(--line);}
  .cell.hdr.corner{top:0;left:0;z-index:4;box-shadow:2px 2px 0 var(--line);}
  .cell.hdr.lit{color:var(--num);}
  .cell.in-rect{color:#141322;}
  .cell.sel{
    transform:scale(1.12);color:#141322;
    box-shadow:0 0 0 2.5px #fff;z-index:2;position:relative;
  }
  .hint{margin-top:10px;font-size:.82rem;color:var(--muted);text-align:center;}

  /* ── ÁREAS ── */
  .inputs{
    display:flex;justify-content:center;align-items:center;gap:12px;
    padding-bottom:14px;flex-wrap:wrap;
  }
  .inputs input{
    font-family:'Fredoka',sans-serif;font-weight:600;
    font-size:clamp(1.5rem,6vw,2.2rem);
    width:clamp(100px,26vw,150px);text-align:center;
    color:var(--num);background:var(--surface);
    border:1.5px solid var(--line);border-radius:12px;
    padding:8px 4px;outline:none;
  }
  .inputs input:focus{border-color:var(--num);}
  .inputs .x{
    font-family:'Fredoka',sans-serif;font-size:1.8rem;color:var(--muted);
  }
  .area-card{
    background:var(--surface);border:1.5px solid var(--line);
    border-radius:14px;padding:14px;
  }
  #area-stage{display:flex;justify-content:center;align-items:flex-end;min-height:200px;}
  .escala{
    margin-top:10px;font-size:.85rem;color:var(--muted);text-align:center;
  }
  .escala b{color:var(--text);}
  .escala .chip{
    display:inline-block;width:12px;height:12px;border-radius:3px;
    background:rgba(255,209,102,.75);border:1px solid var(--num);
    vertical-align:-1px;margin-right:4px;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="modes" role="tablist">
    <button class="mode-btn active" id="btn-tabla" role="tab" onclick="setMode('tabla')">Tabla · hasta 20</button>
    <button class="mode-btn" id="btn-areas" role="tab" onclick="setMode('areas')">Áreas · números grandes</button>
  </div>

  <div class="eq" id="eq" aria-live="polite"></div>

  <!-- ── MODO TABLA ── -->
  <div class="panel active" id="panel-tabla">
    <div class="tabla-scroll">
      <div class="tabla" id="tabla" role="grid" aria-label="Tabla pitagórica de 20 por 20"></div>
    </div>
    <p class="hint">Tocá un número de la tabla.</p>
  </div>

  <!-- ── MODO ÁREAS ── -->
  <div class="panel" id="panel-areas">
    <div class="inputs">
      <input type="number" id="inA" inputmode="numeric" min="1" max="999" placeholder="?" aria-label="Primer número">
      <span class="x">×</span>
      <input type="number" id="inB" inputmode="numeric" min="1" max="999" placeholder="?" aria-label="Segundo número">
    </div>
    <div class="area-card">
      <div id="area-stage"></div>
      <p class="escala" id="escala"></p>
    </div>
    <p class="hint">Escribí dos números (hasta 999) y mirá el tamaño que tiene su resultado.</p>
  </div>
</div>

<script>
  const COLORS = ['#ff6b6b','#ffd166','#06d6a0','#118ab2','#c77dff'];
  const $ = id => document.getElementById(id);

  function tint(hex, alpha){
    const r = parseInt(hex.slice(1,3),16),
          g = parseInt(hex.slice(3,5),16),
          b = parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${alpha})`;
  }

  /* ══════════ ESTADO ══════════ */
  let mode = 'tabla';
  const tablaState = { A: null, B: null };
  const areaState  = { A: null, B: null };

  function setMode(m){
    mode = m;
    $('btn-tabla').classList.toggle('active', m==='tabla');
    $('btn-areas').classList.toggle('active', m==='areas');
    $('panel-tabla').classList.toggle('active', m==='tabla');
    $('panel-areas').classList.toggle('active', m==='areas');
    renderEq();
    if(m==='areas') renderArea();
  }

  function renderEq(){
    const s = mode==='tabla' ? tablaState : areaState;
    if(s.A === null || s.B === null){
      $('eq').innerHTML = `<span class="placeholder">${
        mode==='tabla' ? 'Tocá un número para empezar' : 'Escribí dos números'
      }</span>`;
    }else{
      $('eq').innerHTML =
        `<span class="nA">${s.A}</span> <span class="op">×</span> ` +
        `<span class="nB">${s.B}</span> <span class="op">=</span> ` +
        `<span class="res">${s.A*s.B}</span>`;
    }
  }

  /* ══════════ MODO TABLA (20×20) ══════════ */
  const N = 20;
  const cells = [], hdrTop = [], hdrLeft = [];

  function buildTabla(){
    const grid = $('tabla');
    grid.style.gridTemplateColumns = `repeat(${N+1}, minmax(30px, var(--cell)))`;
    grid.appendChild(hdr('×','corner'));
    for(let j=1;j<=N;j++){ const h = hdr(j,'top'); hdrTop[j]=h; grid.appendChild(h); }
    for(let i=1;i<=N;i++){
      const h = hdr(i,'left'); hdrLeft[i]=h; grid.appendChild(h);
      cells[i] = [];
      for(let j=1;j<=N;j++){
        const btn = document.createElement('button');
        btn.className = 'cell';
        btn.textContent = i*j;
        btn.setAttribute('aria-label', `${j} por ${i}, ${i*j}`);
        btn.addEventListener('click', () => { tablaState.A = j; tablaState.B = i; renderTabla(); renderEq(); });
        grid.appendChild(btn);
        cells[i][j] = btn;
      }
    }
  }
  function hdr(txt, kind){
    const d = document.createElement('div');
    d.className = 'cell hdr ' + kind;
    d.textContent = txt;
    return d;
  }
  function renderTabla(){
    const {A, B} = tablaState;
    for(let i=1;i<=N;i++){
      hdrLeft[i].classList.toggle('lit', A !== null && i === B);
      hdrTop[i].classList.toggle('lit', A !== null && i === A);
      for(let j=1;j<=N;j++){
        const cell = cells[i][j];
        const inside = A !== null && j <= A && i <= B;
        cell.classList.toggle('in-rect', inside);
        cell.classList.toggle('sel', A !== null && i === B && j === A);
        if(inside){
          const color = COLORS[(j-1) % COLORS.length];
          cell.style.background = (i === B && j === A) ? color : tint(color, .78);
        }else{
          cell.style.background = '';
        }
      }
    }
  }

  /* ══════════ MODO ÁREAS ══════════ */
  const AREA_COLOR = '#06d6a0';   /* el área ES el resultado: mismo verde que el número */

  function stepFor(n){
    if(n <= 40)  return 1;
    if(n <= 400) return 10;
    return 100;
  }

  function renderArea(){
    const stage = $('area-stage');
    const esc = $('escala');
    const A = areaState.A, B = areaState.B;
    stage.innerHTML = '';
    esc.innerHTML = '';
    if(A === null || B === null) return;

    /* márgenes para los corchetes con las medidas */
    const ML = 56;   /* izquierda: valor de B */
    const MB = 46;   /* abajo: valor de A */
    const PT = 8, PR = 8;

    const availW = Math.min(stage.clientWidth || 340, 900);
    const maxW = availW - ML - PR;
    const maxH = Math.min(window.innerHeight * 0.45, 440) - MB - PT;
    const scale = Math.min(maxW / A, maxH / B);
    const w = Math.max(A * scale, 10);
    const h = Math.max(B * scale, 10);

    const stepX = stepFor(A);
    const stepY = stepFor(B);
    const colsSmall = (stepX === 1 && A <= 20);

    const X0 = ML, Y0 = PT;
    const totW = ML + w + PR;
    const totH = PT + h + MB;

    const svgNS = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(svgNS,'svg');
    svg.setAttribute('width', totW);
    svg.setAttribute('height', totH);
    svg.setAttribute('viewBox', `0 0 ${totW} ${totH}`);

    /* relleno del área */
    if(colsSmall){
      for(let j=0;j<A;j++){
        const r = document.createElementNS(svgNS,'rect');
        r.setAttribute('x', X0 + j*scale);
        r.setAttribute('y', Y0);
        r.setAttribute('width', scale);
        r.setAttribute('height', h);
        r.setAttribute('fill', tint(COLORS[j % COLORS.length], .8));
        svg.appendChild(r);
      }
    }else{
      const r = document.createElementNS(svgNS,'rect');
      r.setAttribute('x',X0); r.setAttribute('y',Y0);
      r.setAttribute('width',w); r.setAttribute('height',h);
      r.setAttribute('fill', tint(AREA_COLOR, .75));
      svg.appendChild(r);
    }

    /* cuadrícula honesta: líneas cada stepX / stepY */
    const grid = document.createElementNS(svgNS,'g');
    grid.setAttribute('stroke', 'rgba(20,19,34,.6)');
    grid.setAttribute('stroke-width', '1');
    for(let x=0; x<=A; x+=stepX){
      const l = document.createElementNS(svgNS,'line');
      l.setAttribute('x1', X0 + x*scale); l.setAttribute('x2', X0 + x*scale);
      l.setAttribute('y1', Y0);           l.setAttribute('y2', Y0 + h);
      grid.appendChild(l);
    }
    for(let y=0; y<=B; y+=stepY){
      const l = document.createElementNS(svgNS,'line');
      l.setAttribute('x1', X0); l.setAttribute('x2', X0 + w);
      l.setAttribute('y1', Y0 + y*scale); l.setAttribute('y2', Y0 + y*scale);
      grid.appendChild(l);
    }
    svg.appendChild(grid);

    /* casillero de muestra cuando la escala no es 1×1 */
    if(stepX > 1 || stepY > 1){
      const m = document.createElementNS(svgNS,'rect');
      m.setAttribute('x', X0);
      m.setAttribute('y', Y0 + h - stepY*scale);
      m.setAttribute('width', Math.min(stepX*scale, w));
      m.setAttribute('height', Math.min(stepY*scale, h));
      m.setAttribute('fill', 'rgba(255,209,102,.75)');
      m.setAttribute('stroke', '#ffd166');
      m.setAttribute('stroke-width', '1.5');
      svg.appendChild(m);
    }

    /* borde */
    const border = document.createElementNS(svgNS,'rect');
    border.setAttribute('x',X0+0.5); border.setAttribute('y',Y0+0.5);
    border.setAttribute('width',w-1); border.setAttribute('height',h-1);
    border.setAttribute('fill','none');
    border.setAttribute('stroke','#fffffe');
    border.setAttribute('stroke-width','1.5');
    svg.appendChild(border);

    /* ── corchete izquierdo: valor de B ── */
    const bx = X0 - 10;
    svg.appendChild(bracketPath(svgNS, `M ${bx+6} ${Y0} L ${bx} ${Y0} L ${bx} ${Y0+h} L ${bx+6} ${Y0+h}`));
    const tB = svgText(svgNS, X0 - 18, Y0 + h/2, areaState.B, 'end');
    svg.appendChild(tB);

    /* ── corchete inferior: valor de A ── */
    const by = Y0 + h + 10;
    svg.appendChild(bracketPath(svgNS, `M ${X0} ${by-6} L ${X0} ${by} L ${X0+w} ${by} L ${X0+w} ${by-6}`));
    const tA = svgText(svgNS, X0 + w/2, by + 24, areaState.A, 'middle');
    svg.appendChild(tA);

    stage.appendChild(svg);

    if(stepX === 1 && stepY === 1){
      esc.innerHTML = `Cada casillero vale <b>1</b>. Hay ${A} × ${B} = <b>${A*B}</b> casilleros.`;
    }else{
      esc.innerHTML = `<span class="chip"></span>Cada casillero vale <b>${stepX} × ${stepY} = ${stepX*stepY}</b>.`;
    }
  }

  function bracketPath(ns, d){
    const p = document.createElementNS(ns,'path');
    p.setAttribute('d', d);
    p.setAttribute('fill','none');
    p.setAttribute('stroke','#ffd166');
    p.setAttribute('stroke-width','2');
    p.setAttribute('stroke-linecap','round');
    return p;
  }
  function svgText(ns, x, y, txt, anchor){
    const t = document.createElementNS(ns,'text');
    t.setAttribute('x', x);
    t.setAttribute('y', y);
    t.setAttribute('text-anchor', anchor);
    t.setAttribute('dominant-baseline','middle');
    t.setAttribute('fill','#ffd166');
    t.setAttribute('font-family','Fredoka, sans-serif');
    t.setAttribute('font-size','19');
    t.setAttribute('font-weight','600');
    t.textContent = txt;
    return t;
  }

  function onAreaInput(){
    const a = parseInt($('inA').value, 10);
    const b = parseInt($('inB').value, 10);
    areaState.A = (a >= 1 && a <= 999) ? a : null;
    areaState.B = (b >= 1 && b <= 999) ? b : null;
    renderArea();
    renderEq();
  }
  $('inA').addEventListener('input', onAreaInput);
  $('inB').addEventListener('input', onAreaInput);
  window.addEventListener('resize', () => { if(mode==='areas') renderArea(); });

  buildTabla();
  renderTabla();
  renderEq();
</script>
</body>
</html>
